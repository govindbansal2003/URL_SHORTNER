<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(120, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 100, 180, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(80, 200, 255, 0.05) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #a78bfa, #f472b6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #71717a;
            font-size: 1rem;
            font-weight: 300;
        }

        /* Shorten Form Card */
        .card {
            background: rgba(24, 24, 32, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(167, 139, 250, 0.2);
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background: rgba(9, 9, 14, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #e4e4e7;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #52525b;
        }

        .input-group input:focus {
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .btn-primary {
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Result box */
        .result-box {
            display: none;
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 10px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box .label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a78bfa;
            margin-bottom: 8px;
        }

        .result-box .short-url-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .result-box .short-url {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 500;
            color: #c4b5fd;
            word-break: break-all;
        }

        .btn-copy {
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: #c4b5fd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: rgba(167, 139, 250, 0.25);
        }

        /* Error */
        .error-box {
            display: none;
            margin-top: 20px;
            padding: 14px 18px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease;
        }

        /* URL Table */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #d4d4d8;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #71717a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        table td {
            padding: 14px 16px;
            font-size: 0.88rem;
            color: #a1a1aa;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
        }

        table tbody tr {
            transition: background 0.2s ease;
        }

        table tbody tr:hover {
            background: rgba(167, 139, 250, 0.04);
        }

        .url-cell {
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .short-link {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .short-link:hover {
            color: #c4b5fd;
        }

        .click-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.15);
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #93c5fd;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #52525b;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .input-group { flex-direction: column; }
            .card { padding: 20px; }
            .container { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>URL Shortener</h1>
            <p>Make long URLs short and easy to share</p>
        </div>

        <!-- Shorten Form -->
        <div class="card" id="shorten-card">
            <div class="input-group">
                <input type="url" id="url-input" placeholder="Paste your long URL here..." autocomplete="off">
                <button class="btn-primary" id="shorten-btn" onclick="shortenUrl()">Shorten</button>
            </div>
            <div class="result-box" id="result-box">
                <div class="label">Shortened URL</div>
                <div class="short-url-row">
                    <span class="short-url" id="short-url-text"></span>
                    <button class="btn-copy" onclick="copyUrl()">Copy</button>
                </div>
            </div>
            <div class="error-box" id="error-box"></div>
        </div>

        <!-- URL List -->
        <div class="card">
            <div class="section-title">All Shortened URLs</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Short URL</th>
                            <th>Original URL</th>
                            <th>Clicks</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="url-table-body">
                    </tbody>
                </table>
            </div>
            <div class="empty-state" id="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                <p>No URLs shortened yet. Paste one above!</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const API_BASE = '';

        document.getElementById('url-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') shortenUrl();
        });

        // Load URLs on page load
        window.addEventListener('DOMContentLoaded', loadUrls);

        async function shortenUrl() {
            const input = document.getElementById('url-input');
            const btn = document.getElementById('shorten-btn');
            const resultBox = document.getElementById('result-box');
            const errorBox = document.getElementById('error-box');
            const url = input.value.trim();

            resultBox.style.display = 'none';
            errorBox.style.display = 'none';

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            // Add protocol if missing
            let finalUrl = url;
            if (!/^https?:\/\//i.test(finalUrl)) {
                finalUrl = 'https://' + finalUrl;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Shortening...';

            try {
                const res = await fetch(API_BASE + '/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: finalUrl })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Failed to shorten URL');
                }

                const data = await res.json();
                document.getElementById('short-url-text').textContent = data.shortUrl;
                resultBox.style.display = 'block';
                input.value = '';
                loadUrls();
            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Shorten';
            }
        }

        async function loadUrls() {
            try {
                const res = await fetch(API_BASE + '/api/urls');
                const data = await res.json();
                const tbody = document.getElementById('url-table-body');
                const emptyState = document.getElementById('empty-state');

                if (data.length === 0) {
                    tbody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td>
                            <a href="${item.shortUrl}" target="_blank" rel="noopener" class="short-link">
                                ${item.shortCode}
                            </a>
                        </td>
                        <td class="url-cell" title="${escapeHtml(item.originalUrl)}">
                            ${escapeHtml(item.originalUrl)}
                        </td>
                        <td>
                            <span class="click-badge">
                                ${item.clickCount}
                            </span>
                        </td>
                        <td>${formatDate(item.createdAt)}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Failed to load URLs:', err);
            }
        }

        function copyUrl() {
            const url = document.getElementById('short-url-text').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast();
            });
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
